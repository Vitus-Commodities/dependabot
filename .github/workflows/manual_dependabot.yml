name: Manual Dependabot Trigger

on:
  workflow_dispatch:

jobs:
  trigger_dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dependabot
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/dependabot/update"
